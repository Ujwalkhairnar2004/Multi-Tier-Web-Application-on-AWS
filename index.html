<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admission Form</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}

body{
background:linear-gradient(to right,#74ebd5,#ACB6E5);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.form-container{
background:#fff;
padding:30px 40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:100%;
max-width:600px;
animation:fadeIn 1s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px)}
to{opacity:1;transform:translateY(0)}
}

h2{text-align:center;margin-bottom:20px;color:#333}

.form-group{margin-bottom:15px}

label{display:block;margin-bottom:6px;font-weight:600;color:#555}

input,select,textarea{
width:100%;
padding:10px 12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
transition:.3s;
}

input:focus,select:focus,textarea:focus{
border-color:#6C63FF;
box-shadow:0 0 5px rgba(108,99,255,0.3);
outline:none;
}

textarea{resize:vertical;min-height:80px}

.gender-group{
display:flex;
gap:20px;
}

.gender-group input{width:auto}

.btn{
width:100%;
padding:12px;
border:none;
color:#fff;
font-size:16px;
font-weight:600;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.submit{background:#6C63FF}
.submit:hover{background:#574fd6}

.reset{background:#999;margin-top:10px}

#successMsg{
display:none;
color:green;
text-align:center;
margin-top:10px;
font-weight:600;
}

@media(max-width:500px){
.gender-group{flex-direction:column}
}
</style>
</head>

<body>

<div class="form-container">
<h2>Student Admission Form</h2>

<form action="submit.php" method="POST">

<div class="form-group">
<label>Full Name</label>
<input type="text" name="fullname" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Phone</label>
<input type="tel" name="phone" pattern="[0-9]{10}" placeholder="10 digit phone" required>
</div>

<div class="form-group">
<label>Gender</label>
<div class="gender-group">
<label><input type="radio" name="gender" value="Male" required> Male</label>
<label><input type="radio" name="gender" value="Female"> Female</label>
<label><input type="radio" name="gender" value="Other"> Other</label>
</div>
</div>

<div class="form-group">
<label>Course</label>
<select name="course" required>
<option value="">Select course</option>
<option>Computer Science</option>
<option>Mathematics</option>
<option>Physics</option>
<option>Chemistry</option>
<option>Biology</option>
</select>
</div>

<div class="form-group">
<label>Course Year</label>
<select name="year" required>
<option value="">Select year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div class="form-group">
<label>Address</label>
<textarea name="address" required></textarea>
</div>

<button type="submit" class="btn submit">Submit Admission</button>
<button type="reset" class="btn reset">Reset</button>

</form>

<p id="successMsg">Form submitted successfully!</p>
</div>

<script>
document.querySelector("form").addEventListener("submit",function(){
document.getElementById("successMsg").style.display="block";
});
</script>

</body>
</html>
